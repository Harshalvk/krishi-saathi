apiVersion: apps/v1
kind: Deployment
metadata:
  name: crop-recommendation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crop
  template:
    metadata:
      labels:
        app: crop
    spec:
      containers:
        - name: crop
          image: harshalvk/crop-model:v1
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: crop-svc
spec:
  selector:
    app: crop
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
